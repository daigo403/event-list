        let selectedCategories = new Set(allCategories);
        let currentYear = 2026, currentMonth = 6;
        let activeDates = [...new Set(events.map(e => e.date))].sort();
        let currentDayIndex = 0;

        function updatePulldown() {
            const select = document.getElementById('userSelect');
            const monthKey = `${currentYear}-${currentMonth.toString().padStart(2,'0')}`;
            const members = membersByMonth[monthKey] || [];
            const saved = localStorage.getItem('selectedUser');
            select.innerHTML = '<option value="">選択してください...</option>';
            members.forEach(m => {
                let opt = document.createElement('option');
                opt.value = m; opt.text = m;
                if (m === saved) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function toggleAll(checked) {
            selectedCategories = checked ? new Set(allCategories) : new Set();
            document.querySelectorAll('#filterButtons input').forEach(cb => cb.checked = checked);
            render();
        }

        function saveUser() { localStorage.setItem('selectedUser', document.getElementById('userSelect').value); render(); }

        function renderModal(dateKey) {
            const dayEvents = events.filter(e => e.date === dateKey);
            let html = `<div style="font-size:24px; font-weight:bold; margin-bottom:10px;">${dateKey} の全イベント</div>`;
            dayEvents.forEach(e => {
                html += `<div style="border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:5px;">
                    <div style="font-size:24px;">${e.title}</div>
                    <div style="font-size:22px; color:#c00; font-weight:bold;"> ${e.date_str} ${e.time} ～ ${e.end_time}</div>
                    <div style="font-size:20px; color:#555;">場所: ${e.place} | カテゴリ: ${e.category}</div>
                    
                    <div style="font-size:20px; color:#005500; font-weight:bold;">
                        参加者: ${e.members.map(m => getColoredName(m)).join(', ')}
                    </div>
                    
                    <div style="font-size:18px; ">予約名義: ${e.reservation_name}</div>
                    <a href="${e.url}" target="_blank" style="font-size:18px;">詳細・申込はこちら</a>
                </div>`;
            });
            document.getElementById('modalBody').innerHTML = html;
        }

        function changeDay(n) {
            currentDayIndex = Math.max(0, Math.min(currentDayIndex + n, activeDates.length - 1));
            renderModal(activeDates[currentDayIndex]);
        }

        function render() {
            updatePulldown();
            document.getElementById('label').innerText = currentYear + "年" + currentMonth + "月";
            const myName = document.getElementById('userSelect').value;

            const body = document.getElementById('body'); body.innerHTML = '';
            let firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            let lastDay = new Date(currentYear, currentMonth, 0).getDate();
            let row = body.insertRow();
            for(let i=0; i<firstDay; i++) row.insertCell();

            for(let i=1; i<=lastDay; i++) {
                if((firstDay + i - 1) % 7 === 0) row = body.insertRow();
                let cell = row.insertCell();
                let dateKey = `${currentYear}-${currentMonth.toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                
                let day = new Date(currentYear, currentMonth - 1, i).getDay();
                if (holidays.includes(dateKey)) cell.classList.add('hol');
                else if (day === 0) cell.classList.add('sun');
                else if (day === 6) cell.classList.add('sat');
                
                cell.innerHTML = `<strong>${i}</strong>`;
                
                events.filter(e => e.date === dateKey && selectedCategories.has(e.category)).forEach(e => {
                    let ev = document.createElement('div');
                    ev.className = 'event';
                    ev.style.backgroundColor = e.bg_color;
                    ev.style.color = e.text_color;
                    if (myName && e.members.includes(myName)) ev.style.border = "2px solid #d00";
                    ev.innerText = `${e.time} ${e.tag}`;
                    ev.onclick = () => { currentDayIndex = activeDates.indexOf(dateKey); renderModal(dateKey); document.getElementById('modal').style.display = 'block'; };
                    cell.appendChild(ev);
                });
            }
        }

        const filterContainer = document.getElementById('filterButtons');
        allCategories.forEach(cat => {
            let label = document.createElement('label');
            const style = colorMap[cat] ? `background:${colorMap[cat].bg}; color:${colorMap[cat].text}; padding:2px 5px; border-radius:4px;` : '';
            label.innerHTML = `<span style="${style}"><input type="checkbox" checked value="${cat}"> ${cat}</span> `;
            label.querySelector('input').onchange = (e) => { e.target.checked ? selectedCategories.add(cat) : selectedCategories.delete(cat); render(); };
            filterContainer.appendChild(label);
        });

        function changeMonth(n) {
            if (n === 0) {
                currentYear = 2026;
                currentMonth = 6;
            } else {
                currentMonth += n;
                if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            }
            render();
        }

        /*
        function changeMonth(n) {
            currentMonth += n;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            render();
        }
       */

        render();
    </script>
</body>
</html>
