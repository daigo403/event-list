
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 10px; font-size: 24px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f0f0f0; padding: 5px 0; }
        td { border: 1px solid #ccc; height: 120px; vertical-align: top; padding: 2px; }
        .event { font-size: 14px; margin: 2px 0; padding: 4px; cursor: pointer; border-radius: 3px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .nav { text-align: center; margin: 20px 0; }
        .nav button { font-size: 24px; padding: 10px 20px; cursor: pointer; }
        .sun { background: #fff0f0; color: #d00; }
        .sat { background: #f0f8ff; color: #00d; }
        .hol { background: #fff5e6; color: #d60; }
        .today { border: 4px solid #f00 !important; }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000;}
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 85%; border-radius: 10px; text-align: center; }
        .modal-content button { font-size: 24px; padding: 10px 20px; }
        .btn-lg { font-size: 20px; padding: 10px 20px; } /* ボタンサイズ拡大 */
        .footer { margin-top: 30px; font-size: 16px; color: #666; text-align: center; }
        .filter-area { margin: 15px 0; font-size: 18px; }
        .gender-f { color: #ff69b4 !important; font-weight: bold; } /* ピンク */
        .gender-m { color: #1e90ff !important; font-weight: bold; } /* 青 */
        .gender-unknown { color: #555555 !important; } /* 濃いグレー */
    </style>
</head>
<body>
    <div style="margin-bottom: 20px; font-size: 20px;">
        参加者を選択: 
        <select id="userSelect" onchange="saveUser()" style="font-size: 20px; width: 250px; padding: 5px;">
            <option value="">選択してください...</option>
        </select>
    </div>

    <div class="filter-area">
        <button class="btn-lg" onclick="toggleAll(true)" style="margin-right: 10px;">全選択</button>
        <button class="btn-lg" onclick="toggleAll(false)">全解除</button>
        <div id="filterButtons" style="margin-top: 15px;"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div id="modalBody" style="font-size: 20px; margin-bottom: 20px; text-align: left;"></div>
            <button onclick="changeDay(-1)">＜ 前日</button>
            <button onclick="changeDay(1)">翌日 ＞</button>
            <button onclick="document.getElementById('modal').style.display='none'">閉じる</button>
        </div>
    </div>

    <div class="nav">
        <button onclick="changeMonth(-1)">＜ 前月</button>
        <span id="label" style="margin:0 20px; font-weight:bold;"></span>
        <button onclick="changeMonth(1)">次月 ＞</button>
    </div>
    <table>
        <thead><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead>
        <tbody id="body"></tbody>
    </table>

    <div class="nav">
        <button onclick="changeMonth(-1)">＜ 前月</button>
        <button onclick="changeMonth(0)">当月</button>
        <button onclick="changeMonth(1)">次月 ＞</button>
    </div>
    <div class="footer">更新日時: 2026-06-28(日) 12:13:22</div>
    
    <div id="eventListArea" style="margin-top: 40px; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
        <h2 id="eventListTitle" style="margin-top: 0;">当月のイベント一覧</h2>
        <div id="eventListBody"></div>
    </div>

    <script>
        const events = [];
        const membersByMonth = {};
        const holidays = ["2026-01-01", "2026-01-12", "2026-02-11", "2026-02-23", "2026-03-20", "2026-04-29", "2026-05-03", "2026-05-04", "2026-05-05", "2026-05-06", "2026-07-20", "2026-08-11", "2026-09-21", "2026-09-22", "2026-09-23", "2026-10-12", "2026-11-03", "2026-11-23", "2027-01-01", "2027-01-11", "2027-02-11", "2027-02-23", "2027-03-21", "2027-03-22", "2027-04-29", "2027-05-03", "2027-05-04", "2027-05-05", "2027-07-19", "2027-08-11", "2027-09-20", "2027-09-23", "2027-10-11", "2027-11-03", "2027-11-23"];
        const colorMap = {"通常練": {"bg": "#ffcccc", "text": "#993333"}, "基礎練": {"bg": "#ffe5cc", "text": "#cc6600"}, "中級W": {"bg": "#ccccff", "text": "#333399"}, "中級練": {"bg": "#ccffcc", "text": "#006600"}, "女子練": {"bg": "#ffccff", "text": "#993399"}, "基礎+": {"bg": "#e0ccff", "text": "#663399"}};
        
        // --- 追加箇所 ---
        function getColoredName(name) {
            if (name.includes('[f]')) {
                return `<span class="gender-f">${name}</span>`;
            } else if (name.includes('[m]')) {
                return `<span class="gender-m">${name}</span>`;
            } else {
                return `<span class="gender-unknown">${name}</span>`;
            }
        }
        
        let allCategories = [...new Set(events.map(e => e.category))];
        let selectedCategories = new Set(allCategories);
        let currentYear = 2026, currentMonth = 6;
        let activeDates = [...new Set(events.map(e => e.date))].sort();
        let currentDayIndex = 0;

        function updatePulldown() {
            const select = document.getElementById('userSelect');
            const monthKey = `${currentYear}-${currentMonth.toString().padStart(2,'0')}`;
            const members = membersByMonth[monthKey] || [];
            const saved = localStorage.getItem('selectedUser');
            select.innerHTML = '<option value="">選択してください...</option>';
            members.forEach(m => {
                let opt = document.createElement('option');
                opt.value = m; opt.text = m;
                if (m === saved) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function toggleAll(checked) {
            selectedCategories = checked ? new Set(allCategories) : new Set();
            document.querySelectorAll('#filterButtons input').forEach(cb => cb.checked = checked);
            render();
        }

        function saveUser() { localStorage.setItem('selectedUser', document.getElementById('userSelect').value); render(); }

        function renderModal(dateKey) {
            const myName = document.getElementById('userSelect').value;
            const dayEvents = events.filter(e => e.date === dateKey);
            let html = `<div style="font-size:24px; font-weight:bold; margin-bottom:10px;">${dateKey} の全イベント</div>`;
            
            dayEvents.forEach(e => {
                const membersHtml = e.members.map(m => {
                    let colored = getColoredName(m);
                    if (myName && m.includes(myName)) {
                        return `<span style="font-weight:bold; text-decoration: underline; background: #ffff99;">${colored}</span>`;
                    }
                    return colored;
                }).join(', ');

                html += `<div style="border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:5px;">
                    <div style="font-size:24px;">${e.title}</div>
                    <div style="font-size:22px; color:#c00; font-weight:bold;"> ${e.date_str} ${e.time} ～ ${e.end_time}</div>
                    <div style="font-size:20px; color:#555;">場所: ${e.place} | ${e.capacity}</div>
                    <div style="font-size:20px; color:#005500; font-weight:bold;">
                        参加者: ${membersHtml}
                    </div>
                    <div style="font-size:18px; ">予約名義: ${e.reservation_name}</div>
                    <a href="${e.url}" target="_blank" style="font-size:18px;">詳細・申込はこちら</a>
                </div>`;
            });
            document.getElementById('modalBody').innerHTML = html;
        }getElementById('modalBody').innerHTML = html;
      

        function changeDay(n) {
            currentDayIndex = Math.max(0, Math.min(currentDayIndex + n, activeDates.length - 1));
            renderModal(activeDates[currentDayIndex]);
        }
        
        function render() {
            updatePulldown();
            document.getElementById('label').innerText = currentYear + "年" + currentMonth + "月";
            const myName = document.getElementById('userSelect').value;

            const body = document.getElementById('body'); body.innerHTML = '';
            let firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            let lastDay = new Date(currentYear, currentMonth, 0).getDate();
            let row = body.insertRow();
            for(let i=0; i<firstDay; i++) row.insertCell();

            for(let i=1; i<=lastDay; i++) {
                if((firstDay + i - 1) % 7 === 0) row = body.insertRow();
                let cell = row.insertCell();
                let dateKey = `${currentYear}-${currentMonth.toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                
                let day = new Date(currentYear, currentMonth - 1, i).getDay();
                if (holidays.includes(dateKey)) cell.classList.add('hol');
                else if (day === 0) cell.classList.add('sun');
                else if (day === 6) cell.classList.add('sat');
                
                cell.innerHTML = `<strong>${i}</strong>`;
                
                events.filter(e => e.date === dateKey && selectedCategories.has(e.category)).forEach(e => {
                    let ev = document.createElement('div');
                    ev.className = 'event';
                    ev.style.backgroundColor = e.bg_color;
                    ev.style.color = e.text_color;
                    if (myName && e.members.some(m => m.includes(myName))) ev.style.border = "2px solid #d00";
                    ev.innerText = `${e.time} ${e.tag}`;
                    ev.onclick = () => { currentDayIndex = activeDates.indexOf(dateKey); renderModal(dateKey); document.getElementById('modal').style.display = 'block'; };
                    cell.appendChild(ev);
                });
            }

            const listTitle = document.getElementById('eventListTitle');
            const listBody = document.getElementById('eventListBody');
            listTitle.innerText = `${currentYear}年${currentMonth}月のイベント一覧`;
            listBody.innerHTML = '';

            const monthlyEvents = events.filter(e => {
                const [y, m, d] = e.date.split('-').map(Number);
                return y === currentYear && m === currentMonth && selectedCategories.has(e.category);
            });

            if (monthlyEvents.length === 0) {
                listBody.innerHTML = '<p style="color: #666; font-size: 16px;">この月に予定されているイベントはありません。</p>';
            } else {
                monthlyEvents.forEach(e => {
                    const isParticipating = myName && e.members.some(m => m.includes(myName));
                    const eventDiv = document.createElement('div');
                    
                    const borderStyle = isParticipating ? "border: 2px solid #d00; background-color: #fff9f9;" : "";
                    eventDiv.style.cssText = `border-bottom:2px solid #ccc; padding:10px; margin-bottom:5px; font-size: 18px; border-radius: 5px; ${borderStyle}`;
                    
                    const membersHtml = e.members.map(m => {
                        let colored = getColoredName(m);
                        if (myName && m.includes(myName)) {
                            return `<span style="font-weight:bold; text-decoration: underline; background: #ffff99;">${colored}</span>`;
                        }
                        return colored;
                    }).join(', ');

                    eventDiv.innerHTML = `
                        <div style="font-weight:bold;">${e.date_str} ${e.time}～ ${e.title}</div>
                        <div style="color:#555;">場所: ${e.place} | 参加者: ${membersHtml}</div>
                        <a href="${e.url}" target="_blank" style="font-size:18px;">詳細・申込はこちら</a>
                    `;
                    listBody.appendChild(eventDiv);
                });
            }
        }
        
        
        const filterContainer = document.getElementById('filterButtons');
        allCategories.forEach(cat => {
            let label = document.createElement('label');
            const style = colorMap[cat] ? `background:${colorMap[cat].bg}; color:${colorMap[cat].text}; padding:2px 5px; border-radius:4px;` : '';
            label.innerHTML = `<span style="${style}"><input type="checkbox" checked value="${cat}"> ${cat}</span> `;
            label.querySelector('input').onchange = (e) => { e.target.checked ? selectedCategories.add(cat) : selectedCategories.delete(cat); render(); };
            filterContainer.appendChild(label);
        });

        function changeMonth(n) {
            if (n === 0) {
                currentYear = 2026;
                currentMonth = 6;
            } else {
                currentMonth += n;
                if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            }
            render();
        }

        /*
        function changeMonth(n) {
            currentMonth += n;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            render();
        }
       */

        render();
    </script>
</body>
</html>
