        function updatePulldown() {
            const dataList = document.getElementById('userList');
            const monthKey = `${currentYear}-${currentMonth.toString().padStart(2,'0')}`;
            const members = membersByMonth[monthKey] || [];
            dataList.innerHTML = '';
            members.forEach(m => {
                let opt = document.createElement('option');
                opt.value = m;
                dataList.appendChild(opt);
            });
        }

        function saveUser() { 
            localStorage.setItem('selectedUser', document.getElementById('userSelect').value); 
            render(); 
        }

        function goToCurrentMonth() {
            currentYear = defaultYear;
            currentMonth = defaultMonth;
            render();
        }

        function render() {
            updatePulldown();
            document.getElementById('label').innerText = currentYear + "年" + currentMonth + "月";
            
            const saved = localStorage.getItem('selectedUser');
            if (saved && document.getElementById('userSelect').value !== saved) {
                document.getElementById('userSelect').value = saved;
            }
            const myName = document.getElementById('userSelect').value;
            const today = new Date();
            const todayStr = today.getFullYear() + '-' + (today.getMonth()+1).toString().padStart(2,'0') + '-' + today.getDate().toString().padStart(2,'0');
            
            const body = document.getElementById('body');
            body.innerHTML = '';
            let firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            let lastDay = new Date(currentYear, currentMonth, 0).getDate();
            let row = body.insertRow();
            for(let i=0; i<firstDay; i++) row.insertCell();
            for(let i=1; i<=lastDay; i++) {
                if((firstDay + i - 1) % 7 === 0) row = body.insertRow();
                let cell = row.insertCell();
                let dateKey = `${currentYear}-${currentMonth.toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                
                if (dateKey === todayStr) cell.classList.add('today');
                
                let day = new Date(currentYear, currentMonth - 1, i).getDay();
                if (holidays.includes(dateKey)) cell.classList.add('hol');
                else if (day === 0) cell.classList.add('sun');
                else if (day === 6) cell.classList.add('sat');
                
                cell.innerHTML = `<strong>${i}</strong>`;
                
                let dayEvents = events.filter(e => e.date === dateKey);
                dayEvents.forEach((e, idx) => {
                    let ev = document.createElement('div');
                    ev.className = 'event';
                    ev.style.backgroundColor = e.bg_color;
                    if (myName && e.members.includes(myName)) {
                        ev.style.border = "3px solid #d00";
                        ev.style.fontWeight = "bold";
                    }
                    ev.innerText = `${e.time} ${e.title}`;
                    ev.onclick = (event) => { event.stopPropagation(); openModal(dateKey, idx); };
                    cell.appendChild(ev);
                });
            }
        }

        function changeMonth(n) {
            currentMonth += n;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            render();
        }

        function openModal(dateKey, indexInDate) {
            currentDayEvents = events.filter(e => e.date === dateKey);
            currentIndex = indexInDate;
            document.getElementById('modalBody').innerHTML = currentDayEvents[currentIndex].html;
            document.getElementById('modal').style.display = 'block';
        }
        function changeEvent(n) {
            currentIndex = Math.max(0, Math.min(currentIndex + n, currentDayEvents.length - 1));
            document.getElementById('modalBody').innerHTML = currentDayEvents[currentIndex].html;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const urlUser = urlParams.get('user');
        if (urlUser) { localStorage.setItem('selectedUser', urlUser); }
        render();
