                    ev.className = 'event';
                    ev.style.backgroundColor = e.bg_color;
                    ev.style.color = e.text_color; //★ここを追加
                    
                    if (myName && e.members.includes(myName)) {
                        ev.style.border = "3px solid #d00";
                        ev.style.fontWeight = "bold";
                    }
                    
                    //ev.innerText = `${e.time} ${e.category}`;
                    ev.innerText = `${e.time} ${e.tag}`;
                    
                    ev.onclick = () => openModal(dateKey, idx);
                    cell.appendChild(ev);
                });
            }
        }
        
        // ▼ 【ver15修正追加】ページロード時にカテゴリフィルタを生成 ▼
        const filterContainer = document.getElementById('categoryFilters');
        allCategories.forEach(cat => {
            let label = document.createElement('label');
            label.innerHTML = `<input type="checkbox" checked value="${cat}"> ${cat}`;
            label.querySelector('input').onchange = (e) => {
                if (e.target.checked) selectedCategories.add(cat);
                else selectedCategories.delete(cat);
                render();
            };
            filterContainer.appendChild(label);
        });
        // ▲ ここまで追加 ▲

        function changeMonth(n) {
            currentMonth += n;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            render();
        }

        const urlParams = new URLSearchParams(window.location.search);
        const urlUser = urlParams.get('user');
        if (urlUser) {
            localStorage.setItem('selectedUser', urlUser);
        }
        render();
    </script>
</body>
</html>
